<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assam Gallery - This Guy Travels</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fefbf6;color:#333;line-height:1.7;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
img{user-select:none;display:block;}
@font-face { font-family: 'Soria'; src: url('../fonts/soria.ttf') format('opentype'); }

.navbar{
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 3rem;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  z-index:1000;
}
.navbar.sticky{background:rgba(255,255,255,0.85);}
.navbar .logo{font-weight:700;font-size:1.6rem;color:#2c3e50;text-decoration:none;}
.navbar ul{list-style:none;display:flex;gap:2rem;}
.navbar ul li a{font-weight:500;color:#2c3e50;}
.navbar ul li a:hover{color:#ff6f61;}
.hamburger{display:none;font-size:1.6rem;cursor:pointer;color:#2c3e50;}

@media(max-width:768px){
  .navbar ul{display:none; flex-direction:column; background:rgba(255,255,255,0.95); position:absolute; top:100%; right:0; width:200px; padding:1rem;}
  .navbar ul.active{display:flex;}
  .hamburger{display:block;}
}

h1{text-align:center;margin-top:120px;margin-bottom:40px;font-family:'Soria',serif;font-size:2.2rem;}

.gallery-container{max-width:1200px;margin:auto;padding:0 1rem 50px;position:relative;}
.gallery{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px;}
.gallery img{width:100%; border-radius:10px; cursor:pointer; transition:0.35s; box-shadow:0 6px 20px rgba(0,0,0,0.1);}
.gallery img:hover{transform:scale(1.05); box-shadow:0 12px 30px rgba(0,0,0,0.25);}

.popup{position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s;}
.popup.active{opacity:1; pointer-events:auto;}
.popup img{max-width:90%; max-height:90%; border-radius:8px;}
.watermark{position:absolute; color:white; font-size:3rem; font-weight:bold; opacity:0.35; transform:rotate(-35deg); pointer-events:none;}
@media(max-width:768px){.watermark{font-size:2rem; opacity:0.25;}}

footer{text-align:center; padding:2rem; background:#2c3e50; color:white; margin-top:3rem;}
</style>
</head>

<body>
<nav class="navbar" id="navbar">
  <div class="logo">This Guy Travels</div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
  <ul id="navLinks">
    <li><a href="../index.html">HOME</a></li>
    <li><a href="../blogs.html">BLOGS</a></li>
    <li><a href="../destinations.html">DESTINATIONS</a></li>
    <li><a href="../gallery.html">GALLERY</a></li>
    <li><a href="../index.html#itinerary">BUY ITINERARY</a></li>
  </ul>
</nav>

<h1>Assam Photo Gallery</h1>

<div class="gallery-container">
  <div class="gallery" id="gallery">
    <img src="../images/assam/1.jpg" loading="lazy">
    <img src="../images/assam/2.jpg" loading="lazy">
    <img src="../images/assam/3.jpg" loading="lazy">
    <img src="../images/assam/4.jpg" loading="lazy">
    <img src="../images/assam/5.jpg" loading="lazy">
    <img src="../images/assam/6.jpg" loading="lazy">
    <img src="../images/assam/7.jpg" loading="lazy">
    <img src="../images/assam/8.jpg" loading="lazy">
    <img src="../images/assam/9.jpg" loading="lazy">
    <img src="../images/assam/10.jpg" loading="lazy">
    <img src="../images/assam/11.jpg" loading="lazy">
    <img src="../images/assam/12.jpg" loading="lazy">
  </div>
</div>

<div class="popup" id="popup">
  <div class="watermark">THIS GUYY TRAVELS ©</div>
  <img id="popupImg">
</div>

<footer>
  <p>&copy; <span id="year"></span> This Guy Travels</p>
</footer>

<script>
function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
document.getElementById("year").textContent = new Date().getFullYear();
document.addEventListener("contextmenu", e => e.preventDefault());

const images = document.querySelectorAll(".gallery img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");
let currentIndex = 0;

function showPopup(index){
  currentIndex = index;
  if(window.innerWidth<=768) return;
  popupImg.src = images[currentIndex].src;
  popup.classList.add("active");
}

images.forEach((img,i)=>{ img.addEventListener("click",()=>showPopup(i)); });
popup.addEventListener("click", e=>{ if(e.target!==popupImg) popup.classList.remove("active"); });

document.addEventListener("keydown", e=>{
  if(!popup.classList.contains("active")) return;
  if(e.key==="ArrowRight" && window.innerWidth>768){ currentIndex=(currentIndex+1)%images.length; popupImg.src=images[currentIndex].src; }
  if(e.key==="ArrowLeft" && window.innerWidth>768){ currentIndex=(currentIndex-1+images.length)%images.length; popupImg.src=images[currentIndex].src; }
});
</script>
</body>
</html>
