<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery - This Guy Travels</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script>

    function toggleMenu(){
    document.getElementById("nav-links").classList.toggle("show");
    }
    
</script>
<style>
/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
}

.logo{
font-size:1.4rem;
font-weight:600;
}

#nav-links{
list-style:none;
display:flex;
gap:30px;
}

#nav-links a{
color:white;
text-decoration:none;
font-weight:500;
}

#nav-links a:hover{
opacity:0.7;
}

.hamburger{
display:none;
font-size:1.6rem;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

#nav-links{
display:none;
position:absolute;
top:60px;
right:0;
background:#111;
flex-direction:column;
width:200px;
padding:20px;
}

#nav-links.show{
display:flex;
}

.hamburger{
display:block;
}

}
.title{
text-align:center;
font-size:2.5rem;
margin-top:120px;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:20px;
}

.card{
width:320px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="logo">
    <a href="/index.html" style="color:white;text-decoration:none;">This Guy Travels</a>
</div>
<div class="hamburger" onclick="toggleMenu()">☰</div>

<ul id="navLinks">
<li><a href="index.html">HOME</a></li>
<li><a href="blogs.html">BLOGS</a></li>
<li><a href="destinations.html">DESTINATIONS</a></li>
<li><a href="gallery.html">GALLERY</a></li>
<li><a href="index.html#itinerary">BUY ITINERARY</a></li>
</ul>
</nav>

<h1 class="title">Travel Gallery</h1>

<div class="cards">

<a href="galleries/malaysia.html">
<div class="card">
<img src="images/kl.jpg">
<h3>Malaysia</h3>
</div>
</a>

</div>

<!-- FOOTER -->
<footer class="footer">
<p>&copy; <span id="year"></span> This Guy Travels. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
