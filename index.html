<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>This Guy Travels</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<div class="custom-popup" id="customPopup">
  <div class="popup-box">
    <p id="popupMessage"></p>
  </div>
</div>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">This Guy Travels</div>

  <!-- ADD THIS -->
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <ul id="navLinks">
    <li><a href="index.html#home">HOME</a></li>
    <li><a href="blogs.html">BLOGS</a></li>
    <li><a href="destinations.html">DESTINATIONS</a></li>
    <li><a href="#itinerary">BUY ITINERARY</a></li>
  </ul>
</nav>

<!-- HERO SECTION -->
<section class="hero" id="home">
  <div class="overlay"></div>
  <div class="hero-content fade-in">
    <h1>This Guy Travels</h1>
    <p>Curated journeys. Real stories. Beautiful destinations.</p>
    <button onclick="openBooking()">Book a Trip</button>
  </div>
</section>

<!-- BLOG SECTION -->
<section class="blogs" id="blogs">
  <h2>Travel Stories</h2>
  <div class="blog-grid" id="homeBlogs"></div>
</section>

<!-- DESTINATIONS -->
<section class="destinations" id="destinations">
  <h2>Popular Destinations</h2>
  <div class="blog-grid" id="homeDestinations"></div>
</section>

<!-- ITINERARY SECTION -->
<section class="itinerary" id="itinerary">
  <h2>Buy Our Itinerary</h2>
  <button onclick="openItinerary()">Request Itinerary</button>
</section>

<!-- BOOKING MODAL (UNCHANGED FROM YOUR ORIGINAL) -->
<div class="modal" id="bookingModal">
  <div class="modal-content">
    <span onclick="closeModal('bookingModal')" class="close">&times;</span>
    <h2>Book Your Trip</h2>
    <p id="bookingSuccess" class="success-message"></p>
    <form id="bookingForm">
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email" required />
      <input type="tel" placeholder="Phone" required />
      <input type="text" placeholder="Destination" required />
      <input type="date" required />

      <input type="text" placeholder="Duration (5 Days)" />
      <input type="text" placeholder="Departure City" />
      <input type="text" placeholder="Return City" />
      <input type="number" placeholder="Number of Travelers" />
      <input type="text" placeholder="Gender Split (2M,1F)" />
      <input type="text" placeholder="Trip Type" />
      <input type="text" placeholder="Transport Preference" />
      <input type="text" placeholder="Service Type (Budget/Luxury)" />
      <input type="text" placeholder="Budget Range" />
      <textarea placeholder="Special Requests"></textarea>

      <label><input type="checkbox" required /> I agree to service fee terms</label>
      <label><input type="checkbox" required /> Flights are separate</label>

      <button type="submit">Submit Booking</button>
    </form>
  </div>
</div>

<!-- ITINERARY MODAL (UNCHANGED FROM YOUR ORIGINAL) -->
<div class="modal" id="itineraryModal">
  <div class="modal-content">
    <span onclick="closeModal('itineraryModal')" class="close">&times;</span>
    <h2>Request Itinerary</h2>
    <p id="itinerarySuccess" class="success-message"></p>
    <form id="itineraryForm">
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email" required />
      <input type="tel" placeholder="Contact Number" required />
      <input type="text" placeholder="Itinerary Requested" required />
      <button type="submit">Request</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
